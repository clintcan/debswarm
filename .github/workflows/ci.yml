name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: auto
  GO_VERSION: '1.25'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Test with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.7.2
          args: --timeout=5m

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1

      - name: Run gosec security scanner
        run: gosec -fmt=json -out=gosec-results.json -stdout -verbose=text ./... || true

      - name: Check for high-severity findings
        run: |
          if [ ! -f gosec-results.json ]; then
            echo "❌ gosec-results.json not found — gosec failed to run"
            exit 1
          fi
          HIGH_COUNT=$(jq '[.Issues[]? | select(.severity == "HIGH")] | length' gosec-results.json)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "❌ Found $HIGH_COUNT high severity issues:"
            jq '.Issues[] | select(.severity == "HIGH")' gosec-results.json
            exit 1
          fi
          echo "✅ No high severity issues found"

      - name: Upload gosec results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gosec-results
          path: gosec-results.json
        if: always()

  e2e:
    # Drive a REAL apt client through the proxy against a real Debian repo, in a
    # debian:bookworm-slim container. Covers what unit/integration tests can't:
    # APT's default HTTP pipelining over a large index (the ReadTimeout hang
    # class), the metadata cache, and daemon-side signature verification. See
    # test/e2e/.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build linux binary into the e2e build context
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o test/e2e/debswarm ./cmd/debswarm

      - name: Build the e2e image
        run: docker build -t debswarm-e2e test/e2e

      - name: Run APT-through-proxy e2e
        run: docker run --rm debswarm-e2e

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="debswarm-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            BINARY_NAME="${BINARY_NAME}v${{ matrix.goarm }}"
          fi
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/debswarm

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debswarm-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: debswarm-*

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts \
            debhelper \
            libsqlite3-dev \
            pkg-config

      - name: Prepare source
        run: |
          go mod download
          go mod vendor

      - name: Build deb package (amd64)
        env:
          DEB_BUILD_OPTIONS: nocheck
        run: dpkg-buildpackage -b -us -uc -d

      - name: Collect built packages
        run: |
          mkdir -p dist
          cp ../*.deb dist/
          ls -la dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debswarm-deb-amd64
          path: dist/*.deb

      # Smoke-test the package we just built: install it, then confirm the binary,
      # conffiles, dependency, and maintainer-script actions are all correct and
      # that the daemon comes up with the packaged config and serves a request.
      - name: Install the built package
        run: sudo apt-get install -y ./dist/*.deb

      - name: Verify installed package
        run: |
          # "version" is a subcommand, not a --version flag
          debswarm version | grep -qi 'debswarm version'
          # dpkg-managed conffiles are in place
          test -f /etc/debswarm/config.toml
          test -f /etc/apt/apt.conf.d/90debswarm.conf
          # the declared runtime dependency is satisfied
          dpkg -s ca-certificates >/dev/null
          # the systemd unit and system user were created by the maintainer scripts
          test -f /lib/systemd/system/debswarm.service
          getent passwd debswarm >/dev/null

      - name: Daemon runs from the installed systemd service
        run: |
          # Installing the package starts the debswarm systemd service (the runner
          # has systemd), so verify that instance — the real install path — rather
          # than launching a second daemon (which would collide on the P2P port).
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9978/stats >/dev/null 2>&1; then break; fi
            sleep 1
          done
          sudo systemctl is-active --quiet debswarm
          sudo journalctl -u debswarm --no-pager | tail -n 40
          # metrics/stats endpoint responds
          curl -fsS http://127.0.0.1:9978/stats | grep -q requests_total
          # LAN fleet sharing is on by default
          sudo journalctl -u debswarm --no-pager | grep -q 'Fleet coordination enabled'

      - name: Proxy serves a real repository index
        run: |
          # A local mirror can't be used (SSRF protection blocks private hosts),
          # so fetch through the proxy from a default-allowed public mirror.
          curl -fsS --retry 3 --retry-delay 2 -x http://127.0.0.1:9977 \
            http://deb.debian.org/debian/dists/bookworm/InRelease | grep -q '^Origin: Debian'

      - name: Watchdog recovers a hung daemon
        run: |
          # Regression test for the hung-but-alive failure class (a deadlocked
          # HTTP loop once hung apt-get update while the process stayed up, and
          # Restart=on-failure never fired). SIGSTOP the daemon so it stops
          # answering /health and feeding the watchdog, then verify systemd
          # (Type=notify + WatchdogSec=90) kills and restarts it.
          old_pid=$(systemctl show -p MainPID --value debswarm)
          test "$old_pid" -gt 0
          sudo kill -STOP "$old_pid"
          echo "SIGSTOPped pid $old_pid; waiting for the watchdog to fire (<=90s + kill escalation)"
          for _ in $(seq 1 60); do
            new_pid=$(systemctl show -p MainPID --value debswarm)
            if [ "$new_pid" != "$old_pid" ] && [ "$new_pid" -gt 0 ] && sudo systemctl is-active --quiet debswarm; then
              break
            fi
            sleep 5
          done
          new_pid=$(systemctl show -p MainPID --value debswarm)
          echo "old_pid=$old_pid new_pid=$new_pid"
          sudo journalctl -u debswarm --no-pager | grep -iE 'watchdog|abort' | tail -5 || true
          test "$new_pid" != "$old_pid"
          test "$new_pid" -gt 0
          sudo systemctl is-active --quiet debswarm
          # The restarted daemon serves again
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9978/stats >/dev/null 2>&1; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:9978/stats | grep -q requests_total

      - name: APT falls back to DIRECT when the daemon is down
        run: |
          # The apt drop-in routes through Proxy-Auto-Detect with a liveness
          # probe, so a stopped daemon must degrade to direct mirror access
          # instead of failing every apt operation against a dead proxy.
          test -x /usr/lib/debswarm/apt-proxy-detect
          /usr/lib/debswarm/apt-proxy-detect | grep -qx 'http://127.0.0.1:9977'
          sudo systemctl stop debswarm
          /usr/lib/debswarm/apt-proxy-detect | grep -qx 'DIRECT'
          sudo apt-get update -qq   # must succeed, going DIRECT
          sudo systemctl start debswarm
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9978/stats >/dev/null 2>&1; then break; fi
            sleep 1
          done
          /usr/lib/debswarm/apt-proxy-detect | grep -qx 'http://127.0.0.1:9977'
