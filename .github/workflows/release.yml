name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.9.0)'
        required: true

env:
  GOTOOLCHAIN: auto
  GO_VERSION: '1.25'
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Check if tag is on main branch
  check-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Check if tag is on main branch
        id: check
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "$RELEASE_TAG")
          if git branch -r --contains "$TAG_COMMIT" | grep -q 'origin/main'; then
            echo "on_main=true" >> $GITHUB_OUTPUT
            echo "✅ Tag $RELEASE_TAG is on main branch"
          else
            echo "on_main=false" >> $GITHUB_OUTPUT
            echo "❌ Tag $RELEASE_TAG is NOT on main branch - skipping release"
          fi

  release:
    runs-on: ubuntu-latest
    needs: check-branch
    if: needs.check-branch.outputs.on_main == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      # Multi-arch container images are built by GoReleaser (dockers:) and pushed
      # to GHCR. buildx provides the per-platform builder; the login authorizes
      # the push with the workflow's GITHUB_TOKEN (needs packages: write above).
      # No QEMU is needed — the images are pure-COPY distroless (static binary).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.9.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deb:
    runs-on: ubuntu-latest
    needs: [check-branch, release]
    if: needs.check-branch.outputs.on_main == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: amd64
            go_arch: amd64
          - arch: arm64
            go_arch: arm64
          - arch: armhf
            go_arch: arm

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts \
            debhelper \
            libsqlite3-dev \
            pkg-config

      - name: Prepare source
        run: |
          go mod download
          go mod vendor

      - name: Build package
        env:
          DEB_BUILD_OPTIONS: nocheck
        run: |
          # -d skips build dependency checks (Go is installed via actions/setup-go, not apt)
          dpkg-buildpackage -b -us -uc -d -a${{ matrix.arch }}

      - name: List built packages
        run: ls -la ../*.deb

      - name: Upload deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          for deb in ../*.deb; do
            # goreleaser's checksums.txt covers only the tarballs, so publish a
            # SHA256 sidecar next to each .deb. Generated in the .deb's directory
            # so the file lists a bare filename that `sha256sum -c <deb>.sha256`
            # can verify after both are downloaded into the same directory.
            ( cd "$(dirname "$deb")" && sha256sum "$(basename "$deb")" > "$(basename "$deb").sha256" )
            echo "Uploading $deb and its checksum..."
            gh release upload "$RELEASE_TAG" "$deb" "$deb.sha256" --clobber
          done

  # Publish the release .debs into a signed apt repository on the gh-pages branch
  # (served via GitHub Pages). INERT until the operator opts in by setting the
  # repository variable APT_REPO_ENABLED=true, after completing the one-time setup
  # (signing key + APT_GPG_PRIVATE_KEY secret + orphan gh-pages branch + Pages).
  # See docs/design/self-distribution.md. Stable tags only (skips prereleases).
  apt-repo:
    runs-on: ubuntu-latest
    needs: [check-branch, release, build-deb]
    if: >-
      needs.check-branch.outputs.on_main == 'true' &&
      vars.APT_REPO_ENABLED == 'true' &&
      !contains(github.ref_name, '-')
    permissions:
      contents: write
    concurrency:
      group: apt-repo
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Checkout gh-pages (persistent reprepro tree)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: gh-pages
          path: pages
          fetch-depth: 1

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"; chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          export GNUPGHOME
          printf '%s\n' "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/{print $10; exit}')
          echo "APT_GPG_FPR=$FPR" >> "$GITHUB_ENV"
          # Non-interactive signing for reprepro (which signs via gpgme). A
          # passphrase-less key needs nothing; a protected key is preset once via
          # loopback pinentry so signing does not prompt.
          if [ -n "${APT_GPG_PASSPHRASE:-}" ]; then
            printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
            printf 'pinentry-mode loopback\n' > "$GNUPGHOME/gpg.conf"
            gpgconf --kill gpg-agent || true
            KEYGRIP=$(gpg --with-keygrip --list-secret-keys --with-colons | awk -F: '/^grp:/{print $10; exit}')
            HEXPP=$(printf '%s' "$APT_GPG_PASSPHRASE" | od -A n -t x1 | tr -d ' \n')
            gpg-connect-agent "PRESET_PASSPHRASE $KEYGRIP -1 $HEXPP" /bye
          fi

      - name: Build reprepro basedir from the committed config
        run: |
          set -euo pipefail
          mkdir -p pages/conf
          sed "s/__FINGERPRINT__/${APT_GPG_FPR}/" packaging/apt/conf/distributions > pages/conf/distributions

      - name: Download release .debs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          mkdir -p debs
          gh release download "$RELEASE_TAG" --pattern '*.deb' --dir debs

      - name: Include .debs (idempotent; supersede+prune old versions)
        run: |
          set -euo pipefail
          for d in debs/*.deb; do
            reprepro -b pages includedeb stable "$d"
          done

      - name: Publish signing public key
        run: |
          set -euo pipefail
          gpg --armor --export "$APT_GPG_FPR" > pages/debswarm-archive-keyring.asc
          gpg --export "$APT_GPG_FPR" > pages/debswarm-archive-keyring.gpg

      - name: Commit and push gh-pages
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "apt repo unchanged; nothing to publish"
            exit 0
          fi
          git commit -m "apt-repo: publish ${RELEASE_TAG}"
          git push
