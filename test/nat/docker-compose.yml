# Cross-NAT P2P test topology.
#
# Two debswarm peers sit on isolated subnets behind SEPARATE NAT gateways, with
# no route to one another except out through a public network. This reproduces
# the real-world case that the ordinary Docker-bridge soak CANNOT: on a shared
# bridge, containers dial each other directly, so that soak would pass happily on
# a build where cross-NAT P2P is completely broken.
#
#   peer-a ──[lan-a]── nat-a ──┐                     ┌── nat-b ──[lan-b]── peer-b
#          (192.168.10.0/24)   ├──[ public ]─────────┤     (192.168.20.0/24)
#                              │  11.11.11.0/24      │
#                          relay (relay service + DHT bootstrap)
#                          repo  (the "mirror")
#
# NOTE ON THE PUBLIC SUBNET: it must satisfy TWO independent filters, or a NAT'd
# peer never advertises a usable relay address and Tier 2 fails against a *correct*
# implementation:
#   1. debswarm's own SSRF filter (internal/security) drops RFC1918/loopback/
#      link-local from DHT provider records — so the relay cannot sit on 10./172.16-31/
#      192.168./127./169.254.
#   2. libp2p autorelay's cleanupAddressSet keeps only manet.IsPublicAddr() relay
#      addresses when building a peer's /p2p-circuit addrs. manet treats the RFC 5737
#      documentation ranges (192.0.2/24, 198.51.100/24, 203.0.113/24) AND 198.18/15,
#      192.88.99/24, etc. as *unroutable* — NOT public — so a relay on any of those
#      yields an EMPTY circuit-addr set: the reservation succeeds but no circuit
#      address is ever advertised, so two NAT'd peers can never find each other.
# 11.11.11.0/24 is in neither manet.Private4 nor manet.Unroutable4 (verified: it is
# manet.IsPublicAddr==true) and is not RFC1918, so it passes both. It is a Docker-
# internal network, so using otherwise-real DoD space here is self-contained.

volumes:
  # Carries the relay's peer ID to the peers. They cannot be configured with a
  # relay_peers address until the relay has generated its identity.
  shared:

networks:
  public:
    ipam:
      config:
        - subnet: 11.11.11.0/24
  # NOTE: these are deliberately NOT `internal: true`. On Docker Desktop, an
  # internal network's host-side rules drop any transit frame whose L3
  # destination is outside the subnet *before* it reaches a container-based NAT
  # gateway — so a peer's SYN to the public net silently vanishes while ICMP to
  # the gateway itself still works. Ordinary bridges let the gateway forward.
  # Isolation is preserved anyway: lan-a and lan-b are separate bridges (Docker
  # isolates them from each other), and neither peer is attached to `public`, so
  # each can reach the relay/repo ONLY through its own NAT gateway, masqueraded.
  lan-a:
    ipam:
      config:
        - subnet: 192.168.10.0/24
  lan-b:
    ipam:
      config:
        - subnet: 192.168.20.0/24

services:
  # The "mirror": a small flat apt repository, baked at image build time.
  repo:
    build:
      context: .
      dockerfile: Dockerfile.repo
    container_name: nat-repo
    networks:
      public:
        ipv4_address: 11.11.11.5

  # Publicly reachable debswarm: runs the circuit-relay service and is the DHT
  # bootstrap node for the swarm.
  relay:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: nat-relay
    networks:
      public:
        ipv4_address: 11.11.11.10
    volumes:
      - shared:/shared
    environment:
      # run.sh --relay-data raises this so the relay will carry small package
      # transfers for symmetric-NAT'd peers that cannot hole-punch. Empty (default)
      # keeps the relay coordinate-only.
      RELAY_BUFFER_SIZE: ${RELAY_BUFFER_SIZE:-}
    command: ["relay"]

  # NAT gateway for peer-a. Dual-homed; MASQUERADEs lan-a out onto public.
  nat-a:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: nat-gw-a
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.ip_forward: 1
    environment:
      LAN_SUBNET: 192.168.10.0/24
    networks:
      public:
        ipv4_address: 11.11.11.20
      lan-a:
        ipv4_address: 192.168.10.2   # .1 is Docker's own bridge gateway
    command: ["gateway"]

  nat-b:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: nat-gw-b
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.ip_forward: 1
    environment:
      LAN_SUBNET: 192.168.20.0/24
    networks:
      public:
        ipv4_address: 11.11.11.21
      lan-b:
        ipv4_address: 192.168.20.2   # .1 is Docker's own bridge gateway
    command: ["gateway"]

  # The NAT'd peers. Each can only reach the outside world via its gateway, and
  # has no path at all to the other peer except a hole punched through the relay.
  peer-a:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: nat-peer-a
    cap_add: [NET_ADMIN]   # to install the default route via its gateway
    depends_on: [nat-a, relay, repo]
    networks:
      lan-a:
        ipv4_address: 192.168.10.10
    volumes:
      - shared:/shared
    environment:
      GATEWAY: 192.168.10.2
      # run.sh --baseline forces this false, which MUST make the test fail.
      AUTORELAY: ${AUTORELAY:-true}
      # run.sh --relay-data sets this >0 to allow fetching a small package over a
      # relayed connection when the hole punch fails. 0 (default) = disabled.
      RELAYED_TRANSFER_MAX: ${RELAYED_TRANSFER_MAX:-0}
    command: ["peer"]

  peer-b:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: nat-peer-b
    cap_add: [NET_ADMIN]
    depends_on: [nat-b, relay, repo]
    networks:
      lan-b:
        ipv4_address: 192.168.20.10
    volumes:
      - shared:/shared
    environment:
      GATEWAY: 192.168.20.2
      AUTORELAY: ${AUTORELAY:-true}
      RELAYED_TRANSFER_MAX: ${RELAYED_TRANSFER_MAX:-0}
    command: ["peer"]
