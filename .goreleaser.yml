version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: debswarm
    main: ./cmd/debswarm
    binary: debswarm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - packaging/90debswarm.conf
      - packaging/debswarm.service
      - packaging/config.example.toml

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Multi-arch container images published to GHCR. The binary is fully static
# (CGO_ENABLED=0), so each Dockerfile is a pure COPY on distroless and the arm
# variants build without QEMU. GoReleaser stages the matching per-arch binary as
# `debswarm` and the extra_files at their repo-relative paths (matching the
# Dockerfile COPY paths). Requires a `docker login ghcr.io` step before release.
dockers:
  - id: debswarm-amd64
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-amd64"
    extra_files:
      - packaging/config.container.default.toml
      - packaging/container
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=debswarm"
      - "--label=org.opencontainers.image.description=Peer-to-peer package distribution for APT"
      - "--label=org.opencontainers.image.source=https://github.com/clintcan/debswarm"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: debswarm-arm64
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-arm64"
    extra_files:
      - packaging/config.container.default.toml
      - packaging/container
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=debswarm"
      - "--label=org.opencontainers.image.description=Peer-to-peer package distribution for APT"
      - "--label=org.opencontainers.image.source=https://github.com/clintcan/debswarm"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: debswarm-armv7
    goos: linux
    goarch: arm
    goarm: "7"
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-armv7"
    extra_files:
      - packaging/config.container.default.toml
      - packaging/container
    build_flag_templates:
      - "--platform=linux/arm/v7"
      - "--label=org.opencontainers.image.title=debswarm"
      - "--label=org.opencontainers.image.description=Peer-to-peer package distribution for APT"
      - "--label=org.opencontainers.image.source=https://github.com/clintcan/debswarm"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

docker_manifests:
  - name_template: "ghcr.io/clintcan/debswarm:{{ .Version }}"
    image_templates:
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-amd64"
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-arm64"
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-armv7"
  # major.minor and latest are skipped for prereleases (prerelease: auto), so an
  # -rc tag never clobbers the stable moving tags.
  - name_template: "ghcr.io/clintcan/debswarm:{{ .Major }}.{{ .Minor }}"
    skip_push: auto
    image_templates:
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-amd64"
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-arm64"
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-armv7"
  - name_template: "ghcr.io/clintcan/debswarm:latest"
    skip_push: auto
    image_templates:
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-amd64"
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-arm64"
      - "ghcr.io/clintcan/debswarm:{{ .Version }}-armv7"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Performance'
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: 'Other'
      order: 999

release:
  # Auto-detect from git remote (no hardcoded owner/name)
  draft: false
  prerelease: auto
  mode: replace
  name_template: "{{.ProjectName}} v{{.Version}}"
  header: |
    ## debswarm v{{.Version}}

    debswarm accelerates APT package downloads by fetching packages from nearby peers while maintaining security through cryptographic verification. It operates as a transparent HTTP proxy, requiring no changes to your normal `apt` workflow.

    ### Installation

    **Quick install:**
    ```bash
    curl -sSL {{ .ReleaseURL }}/debswarm_{{.Version}}_linux_amd64.tar.gz | sudo tar -xz -C /usr/local/bin debswarm
    ```
  footer: |
    ---

    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY }}/compare/{{ .PreviousTag }}...{{ .Tag }}
