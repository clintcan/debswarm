# debswarm system configuration
# Installed to /etc/debswarm/config.toml by the .deb package
# Paths configured for systemd service with DynamicUser
#
# For complete documentation, see:
# https://github.com/debswarm/debswarm/blob/main/docs/configuration.md

[network]
listen_port = 4001
proxy_port = 9977
# HTTP proxy bind. Default 127.0.0.1 (local only). A non-loopback bind (LAN
# server mode) REQUIRES proxy_allowed_cidrs (fail-closed). APT's GPG verification
# is unchanged; the allowlist only controls which clients may connect.
proxy_bind = "127.0.0.1"
# proxy_allowed_cidrs = ["192.168.0.0/16"]  # required if proxy_bind is non-loopback
max_connections = 100
# connectivity_mode = "auto"  # "auto", "lan_only", "online_only"

# NAT traversal (v1.13+)
# enable_relay = true         # Use circuit relays to reach NAT'd peers
# enable_hole_punching = true # Enable direct NAT hole punching

# libp2p public bootstrap nodes
bootstrap_peers = [
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmNnooDu7bfjPFoTZYxMNLWUQJyrVwtbZg5gBMjTezGAJN",
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmQCU2EcMqAqQPR2i9bChDtGNJchTbq5TbXJJ16u19uLTa",
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmbLHAnMoJPWSCR5Zhtx6BHJX9KiKNN6tpvbUcqanj75Nb",
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmcZf59bWwK5XFi76CZX8cbJ4BhTzzA3gU1ZjYZcYW3dwt",
]

[proxy]
# Trust a curated set of common third-party repositories by default (Launchpad
# PPAs, download.docker.com, apt.postgresql.org, deb.nodesource.com,
# packages.microsoft.com, apt.releases.hashicorp.com, mirrors.kernel.org,
# pkgs.k8s.io), in addition to Debian, Ubuntu, and Linux Mint. Set to false for
# a strict, mirrors-only posture. Private/internal hosts are always blocked
# (SSRF protection) and every download is SHA256-checked against the repository
# index regardless of this setting.
trust_known_repos = true

# Additional repository hosts to allow, on top of the built-ins and the trusted
# set above. Both /dists/ + /pool/ and flat-layout repositories are supported.
# allowed_hosts = ["my-mirror.example.com"]

# Hosts to fetch over HTTPS even when APT requests them via plain HTTP, so
# HTTPS-only repositories can still be cached, verified, and P2P-shared (an
# opaque HTTPS CONNECT tunnel cannot). Known HTTPS-only repos (pkgs.k8s.io) are
# included automatically when trust_known_repos is on.
# https_upstream_hosts = ["apt.internal.example.com"]

[cache]
# System paths for systemd service
path = "/var/cache/debswarm"
max_size = "10GB"
min_free_space = "1GB"
# Cache repository metadata (Release/Packages/Translation/Contents/DEP-11) so a
# cold client revalidates against the local cache instead of re-fetching it from
# the WAN. Revalidated on every request; APT's signature check is unchanged.
cache_metadata = true
metadata_max_size = "1GB"
# Serve cached metadata when the mirror is unreachable so apt-get update keeps
# working offline (response marked X-Debswarm-Stale). APT still verifies the GPG
# signature and Valid-Until. Set false to make an unreachable mirror a hard error.
serve_stale_metadata = true

[security]
# Verify each repository's GPG-signed Release against a trusted keyring (and each
# Packages index against that Release) before trusting its hashes.
# "off" | "warn" | "auto" | "enforce". Default "auto": refuse an index only when a
# repo CAN be verified and fails (a signed Release exists but the index does not
# match it), and serve-and-report otherwise — real protection where a key is
# discoverable without breaking repos that cannot be verified. "warn" only reports
# (identical to old behavior for APT); "enforce" is fully fail-closed; "off"
# disables it. APT still verifies GPG end-to-end in every mode. Keys are
# auto-discovered from the host's APT keyrings; requires cache_metadata above
# (auto/warn degrade gracefully if it or a keyring is missing). See docs/configuration.md.
verify_upstream_signatures = "auto"
# keyring_path = "/etc/debswarm/keyrings"   # extra keys (needed on an apt-less cache-server in enforce)

[transfer]
max_upload_rate = "0"
max_download_rate = "0"
# Per-peer rate limiting (default: auto)
# per_peer_upload_rate = "auto"
# per_peer_download_rate = "auto"
# expected_peers = 10
max_concurrent_uploads = 20
max_concurrent_peer_downloads = 10
retry_max_attempts = 3
retry_interval = "5m"
retry_max_age = "1h"

[dht]
provider_ttl = "24h"
announce_interval = "12h"

[privacy]
enable_mdns = true
announce_packages = true
# psk_path = "/etc/debswarm/swarm.key"
# peer_allowlist = []
# peer_blocklist = []

[metrics]
port = 9978
bind = "127.0.0.1"

[logging]
level = "info"
file = ""

# Audit logging (v1.8+)
# [logging.audit]
# enabled = true
# path = "/var/log/debswarm/audit.json"
# max_size_mb = 100
# max_backups = 5

# Scheduled sync windows (v1.9+)
# [scheduler]
# enabled = true
# timezone = "America/New_York"
# outside_window_rate = "100KB/s"

# Fleet coordination — LAN peer-to-peer sharing.
# On by default since v1.30: nodes on the same LAN share cached packages over
# P2P and coordinate to avoid redundant WAN downloads of the same package.
# Every shared package is still SHA256-checked against the repository index. Set
# enabled = false for an isolated node that should not share on the LAN.
[fleet]
enabled = true
# claim_timeout = "5s"
# max_wait_time = "5m"

# Package index settings (v1.18+)
[index]
# Parse APT's local package lists to enable P2P even when apt update bypasses proxy
apt_lists_path = "/var/lib/apt/lists"
watch_apt_lists = true
