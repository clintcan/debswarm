# debswarm configuration example
# Copy to /etc/debswarm/config.toml or ~/.config/debswarm/config.toml
#
# For complete documentation of all options, see:
# https://github.com/debswarm/debswarm/blob/main/docs/configuration.md

#─────────────────────────────────────────────────────────────────────────────
# [network] - P2P and proxy settings
#─────────────────────────────────────────────────────────────────────────────
[network]
# P2P listen port (UDP for QUIC, TCP fallback)
# Make sure this port is accessible through your firewall for incoming connections
listen_port = 4001

# HTTP proxy port for APT
# APT connects to http://127.0.0.1:<port> via /etc/apt/apt.conf.d/90debswarm.conf
proxy_port = 9977

# HTTP proxy bind address (LAN server mode).
# Default "127.0.0.1" serves only this machine. Set a LAN interface IP (or
# "0.0.0.0" for all interfaces) to let other hosts use this box as their APT
# cache — e.g. one cache per office/lab/CI fleet.
#
# SECURITY: a non-loopback bind REQUIRES proxy_allowed_cidrs below (fail-closed —
# the daemon refuses to start otherwise). Upstream fetches stay restricted to
# known Debian mirrors, and clients still get APT's own GPG verification, so a LAN
# client is no less safe than a local one; the allowlist controls WHO may connect.
proxy_bind = "127.0.0.1"

# Client networks (CIDR) permitted to use the proxy when proxy_bind is
# non-loopback. Loopback is always allowed. Required for a non-loopback bind.
# If proxy_bind is also a non-loopback metrics.bind, this list additionally gates
# the admin read endpoints (stats/dashboard/cache inventory).
# proxy_allowed_cidrs = ["192.168.1.0/24", "10.42.0.0/16"]
proxy_allowed_cidrs = []

# Maximum concurrent P2P connections
# Prevents resource exhaustion; libp2p connection manager enforces this limit
max_connections = 100

# Connectivity detection mode (v1.8+)
# Controls how debswarm handles network connectivity:
#   "auto" = detect automatically (default) - checks mirror reachability
#   "lan_only" = only use mDNS peers, never try DHT or mirrors
#   "online_only" = fail if internet is unavailable (no LAN-only fallback)
connectivity_mode = "auto"

# How often to check connectivity (when mode is "auto")
# Go duration format: "30s", "1m", "5m"
connectivity_check_interval = "30s"

# URL to check for connectivity (typically a Debian/Ubuntu mirror).
# Used for HEAD requests to verify internet access. Defaults to plain HTTP so
# the check reflects mirror reachability rather than TLS trust; the URL must not
# redirect to HTTPS.
# connectivity_check_url = "http://deb.debian.org/debian/"

# NAT traversal (all default to true)
# enable_relay: circuit-relay transport — lets this node dial and be dialed via a relay
# enable_autorelay: reserve a slot on a relay so peers behind NAT can reach us at all.
#   Without a reservation there is no /p2p-circuit address, nothing can dial us, and
#   hole punching (which only fires over an existing relayed connection) never triggers.
# enable_hole_punching: upgrade a relayed connection to a direct one (DCUtR); the direct
#   connection is what carries package bytes — relays only coordinate the punch.
# Disable only if your network policy forbids relayed or hole-punched connections.
# enable_relay = true
# enable_autorelay = true
# enable_hole_punching = true

# relay_service: run a circuit-relay service to help NAT'd peers connect.
#   "auto" (default) - only when AutoNAT reports this node is publicly reachable
#   "on"             - always (use on a known-public host if AutoNAT is unsure)
#   "off"            - never
# Relays only coordinate hole punches; they never carry package bytes (circuit-v2
# limits are tiny by design), so the cost of helping is bounded and small.
# relay_service = "auto"

# relay_peers: static relays to reserve on, in addition to any discovered from the
# swarm. REQUIRED for a private (PSK) swarm, which has no public DHT to discover
# relays through. Full multiaddrs including /p2p/<peer-id>.
# relay_peers = [
#   "/ip4/203.0.113.10/udp/4001/quic-v1/p2p/12D3KooW...",
# ]

# force_reachability: override AutoNAT's public/private detection.
#   "auto" (default) - let AutoNAT decide
#   "private"        - assert we are behind NAT; makes AutoRelay reserve a relay slot
#                      immediately instead of waiting for AutoNAT, which in a small
#                      swarm may never gather enough samples to decide
#   "public"         - assert we are publicly reachable (suits a relay/seed node)
# force_reachability = "auto"

# relay_limits: bounds on what this node carries when acting as a relay. The
# defaults mirror circuit-relay v2 and are sized for hole-punch coordination, not
# bulk transfer, so they are deliberately small.
# [network.relay_limits]
# max_reservations = 128    # concurrent peers we vouch for
# max_circuits     = 16     # concurrent relayed connections
# buffer_size      = "128KB" # per-circuit data cap
# duration         = "2m"   # per-circuit lifetime

# Bootstrap peers for DHT initialization
# These are libp2p public bootstrap nodes; add your own for private networks
bootstrap_peers = [
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmNnooDu7bfjPFoTZYxMNLWUQJyrVwtbZg5gBMjTezGAJN",
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmQCU2EcMqAqQPR2i9bChDtGNJchTbq5TbXJJ16u19uLTa",
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmbLHAnMoJPWSCR5Zhtx6BHJX9KiKNN6tpvbUcqanj75Nb",
  "/dnsaddr/bootstrap.libp2p.io/p2p/QmcZf59bWwK5XFi76CZX8cbJ4BhTzzA3gU1ZjYZcYW3dwt",
]

#─────────────────────────────────────────────────────────────────────────────
# [proxy] - HTTP proxy settings
#─────────────────────────────────────────────────────────────────────────────
[proxy]
# Trust a curated set of common third-party repositories by default, in addition
# to Debian, Ubuntu, and Linux Mint. Set to false for a strict, mirrors-only posture.
# Trusted by default:
#   Launchpad PPAs (ppa.launchpad.net, ppa.launchpadcontent.net, launchpadlibrarian.net),
#   download.docker.com, apt.postgresql.org, deb.nodesource.com,
#   packages.microsoft.com, apt.releases.hashicorp.com, mirrors.kernel.org,
#   pkgs.k8s.io (Kubernetes, flat layout)
# Regardless of this setting, private/internal hosts are always blocked (SSRF
# protection) and every download is still checked against the repository index's SHA256.
trust_known_repos = true

# Additional repository hosts to allow, on top of the built-ins and (when enabled)
# the trusted set above. Add repos not covered by trust_known_repos here. Both the
# standard /dists/ + /pool/ layout and flat repositories (e.g. openSUSE OBS) are
# supported.
allowed_hosts = [
  # "packages.gitlab.com",
  # "download.opensuse.org",   # flat-layout OBS repos (CRI-O, etc.)
  # "my-mirror.example.com",
]

# Hosts to fetch over HTTPS even when APT requests them via plain HTTP. This lets
# APT talk plain HTTP to the local debswarm proxy while debswarm makes its own
# HTTPS connection to the mirror — so HTTPS-only repositories can still be cached,
# verified, and shared over P2P (an opaque HTTPS CONNECT tunnel cannot do any of
# that). Point the repo's sources.list entry at http:// and list its host here.
# The host must also be allowed (built-in, trusted, or in allowed_hosts above).
# When trust_known_repos is enabled, known HTTPS-only repos (pkgs.k8s.io) are
# included automatically.
https_upstream_hosts = [
  # "pkgs.k8s.io",             # Kubernetes (HTTPS-only) — trusted automatically
  # "apt.internal.example.com",
]

#─────────────────────────────────────────────────────────────────────────────
# [cache] - Package cache settings
#─────────────────────────────────────────────────────────────────────────────
[cache]
# Cache directory for packages and SQLite database
# Use absolute path or ~ for home directory
# Note: CACHE_DIRECTORY env var (set by systemd) overrides this
path = "~/.cache/debswarm"

# Maximum cache size
# Supports: KB, MB, GB, TB suffixes (e.g., "10GB", "500MB")
# LRU eviction removes old packages when limit is reached
max_size = "10GB"

# Minimum free disk space to maintain
# Cache writes fail if this limit would be violated
min_free_space = "1GB"

# Cache repository metadata (Release/InRelease, Packages, Translation, Contents,
# DEP-11) in addition to .deb packages. With this on, a cold client (e.g. a fresh
# CI container) fetches metadata from the local cache after a cheap revalidation
# instead of re-downloading it all from the WAN on every apt-get update. APT's
# signature verification is unaffected — under normal operation the cache always
# revalidates with the mirror before serving (see serve_stale_metadata for the
# offline exception). Default: true.
cache_metadata = true

# Disk budget for the metadata cache, kept separate from max_size so metadata and
# packages never evict each other. Default: "1GB".
metadata_max_size = "1GB"

# Serve cached metadata when the mirror is unreachable (network down, mirror
# outage, or connectivity monitor reporting offline) instead of failing apt-get
# update. The response carries an X-Debswarm-Stale: true header. This never
# weakens security: APT still verifies the GPG signature and Valid-Until of
# whatever is served, so an expired Release file is rejected by APT itself. Set
# to false to make an unreachable mirror a hard error even when a cached copy
# exists. Default: true.
serve_stale_metadata = true

#─────────────────────────────────────────────────────────────────────────────
# [security] - Daemon-side upstream signature verification
#─────────────────────────────────────────────────────────────────────────────
[security]
# Verify each repository's GPG-signed Release against a trusted keyring, and each
# Packages index against that signed Release, before trusting the SHA256 it lists.
# This anchors the hash debswarm checks to GPG instead of "the mirror said so",
# hardening the cases APT's own check does not cover: [trusted=yes] repos,
# dpkg -i of a cached file, and the packages debswarm seeds to P2P peers.
#
#   "off"     - no verification (unchanged behavior).
#   "warn"    - verify and report (metric + log + X-Debswarm-Unverified header on
#               failure) but always serve. Identical to "off" from APT's point of
#               view — nothing is refused; it only adds visibility.
#   "auto"    - refuse an index only when it CAN be verified and fails (a signed
#               Release exists for the repo but the index does not match it), and
#               behave like "warn" when verification is not possible (no trusted
#               key for the repo, a flat/no-dists repo, or no cached Release). Real
#               protection for every repo whose key is discoverable, without
#               breaking repos that cannot be verified. This is the default.
#   "enforce" - refuse to parse/serve an index whenever it is not verified,
#               including when verification could not be attempted (fail-closed).
#
# APT's own end-to-end GPG verification is unaffected in every mode. Verification
# reads the signed Release from the metadata cache, so it requires cache_metadata
# above; enforce additionally requires at least one trusted key (below). auto and
# warn degrade gracefully if a keyring or the metadata cache is missing.
verify_upstream_signatures = "auto"

# Optional file or directory of extra trusted public keys (binary .gpg or armored
# .asc), in addition to the host's APT keyrings which are discovered automatically
# (/etc/apt/trusted.gpg{,.d}, /usr/share/keyrings, /etc/apt/keyrings). On a normal
# Debian/Ubuntu host debswarm then trusts exactly what APT trusts with no config.
# Set this on a dedicated cache-server whose own APT keyrings are empty.
# keyring_path = "/etc/debswarm/keyrings"

# Hosts served even when their index cannot be verified — an escape hatch that
# applies only in enforce mode, for a repo whose signing key cannot be provisioned.
# verify_exempt_hosts = ["internal-repo.example.com"]

#─────────────────────────────────────────────────────────────────────────────
# [transfer] - Upload/download settings
#─────────────────────────────────────────────────────────────────────────────
[transfer]
# Maximum upload bandwidth
# Supports: KB/s, MB/s, GB/s (e.g., "10MB/s", "500KB/s")
# Use "0" or "unlimited" for no limit
max_upload_rate = "0"

# Maximum download bandwidth
max_download_rate = "0"

# Per-peer rate limiting (default: "auto")
# Prevents any single peer from monopolizing bandwidth
#   "auto" = global_limit / expected_peers
#   "0" = disabled (only global limits apply)
#   Specific rate: "5MB/s"
per_peer_upload_rate = "auto"
per_peer_download_rate = "auto"

# Expected number of peers for auto-calculation
# Used when per_peer_*_rate is set to "auto"
expected_peers = 10

# Adaptive rate limiting (enabled by default when per-peer limiting is active)
# Automatically adjusts per-peer rates based on peer performance:
#   - High-performing peers get up to 1.5x the base rate
#   - Poorly-performing peers get reduced rates (down to min_rate)
#   - Congestion detection reduces rates when latency exceeds 500ms
# adaptive_rate_limiting = true

# Minimum rate floor for adaptive reduction
# Ensures no peer gets throttled below this threshold
adaptive_min_rate = "100KB/s"

# Maximum boost factor for high-performing peers
# 1.5 = up to 50% boost above base rate
adaptive_max_boost = 1.5

# Maximum concurrent uploads to other peers
# Limits how many peers can download from you simultaneously
max_concurrent_uploads = 20

# Maximum concurrent chunk downloads from peers
# Higher values may improve large file download speed
max_concurrent_peer_downloads = 10

# Automatic retry for failed downloads
# Set to 0 to disable automatic retry
retry_max_attempts = 3

# How often to check for failed downloads to retry
# Go duration format: "5m" (5 minutes), "1h" (1 hour), "30s" (30 seconds)
retry_interval = "5m"

# Don't retry downloads older than this
# Prevents retrying stale failures indefinitely
retry_max_age = "1h"

#─────────────────────────────────────────────────────────────────────────────
# [dht] - Distributed Hash Table settings
#─────────────────────────────────────────────────────────────────────────────
[dht]
# How long provider records (package announcements) remain in the DHT
# Shorter = faster propagation of removed packages
# Longer = less DHT traffic
provider_ttl = "24h"

# How often to re-announce cached packages to the DHT
# Should be less than provider_ttl to ensure continuous availability
announce_interval = "12h"

#─────────────────────────────────────────────────────────────────────────────
# [privacy] - Privacy and access control
#─────────────────────────────────────────────────────────────────────────────
[privacy]
# Enable mDNS for local network peer discovery
# Set to false if you don't want to be discoverable on LAN
enable_mdns = true

# Announce cached packages to the network
# Set to false to only download, never upload (leech mode)
announce_packages = true

# Private swarm settings
# Use 'debswarm psk generate' to create a PSK file
# All nodes in the private swarm must use the same PSK
psk_path = ""

# Inline PSK in hex format (mutually exclusive with psk_path)
# NOT RECOMMENDED - use psk_path instead for better security
# psk = ""

# List of allowed peer IDs (empty = allow all)
# Use to restrict connections to specific known peers
# Get peer IDs with 'debswarm identity show' on each node
peer_allowlist = []
# Example:
# peer_allowlist = [
#   "12D3KooWAbCdEfGhIjKlMnOpQrStUvWxYz...",
#   "12D3KooWBcDeFgHiJkLmNoPqRsTuVwXyZa...",
# ]

# List of blocked peer IDs
# Connections from these peers will always be rejected
# Useful for blocking malicious or misbehaving peers
peer_blocklist = []
# Example:
# peer_blocklist = [
#   "12D3KooWMaliciousPeerIdHere...",
# ]

#─────────────────────────────────────────────────────────────────────────────
# [metrics] - Monitoring and dashboard
#─────────────────────────────────────────────────────────────────────────────
[metrics]
# Metrics/dashboard server port
# Set to 0 to disable metrics server entirely
port = 9978

# Metrics server bind address
# SECURITY WARNING: Changing from 127.0.0.1 exposes operational data:
#   - Cache statistics and hit rates
#   - Connected peer counts and IDs
#   - Download/upload statistics
#   - Runtime profiling data (pprof)
# If exposing externally, use a reverse proxy with authentication
bind = "127.0.0.1"

#─────────────────────────────────────────────────────────────────────────────
# [logging] - Log output settings
#─────────────────────────────────────────────────────────────────────────────
[logging]
# Log level: debug, info, warn, error
# Use "debug" for troubleshooting (very verbose)
level = "info"

# Log file path
# Empty = log to stderr (recommended for systemd services)
# When running as systemd service, use journalctl to view logs
file = ""

# Example: log to file (for non-systemd deployments)
# file = "/var/log/debswarm/debswarm.log"

#─────────────────────────────────────────────────────────────────────────────
# [logging.audit] - Structured audit logging (v1.8+)
#─────────────────────────────────────────────────────────────────────────────
[logging.audit]
# Enable structured audit logging
# Logs download/upload events, cache hits, and verification failures
# Output is JSON Lines format for easy parsing by log analysis tools
enabled = false

# Path for JSON audit log file
# The directory will be created if it doesn't exist
path = "/var/log/debswarm/audit.json"

# Max file size before rotation (MB)
# Old logs are renamed with .1, .2, etc. suffixes
max_size_mb = 100

# Number of rotated files to keep
# Oldest files are deleted when this limit is exceeded
max_backups = 5

#─────────────────────────────────────────────────────────────────────────────
# [scheduler] - Time-based download scheduling (v1.9+)
#─────────────────────────────────────────────────────────────────────────────
[scheduler]
# Enable scheduled sync windows
# When enabled, downloads are rate-limited outside of configured windows
enabled = false

# Timezone for window evaluation (IANA timezone name)
# See: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone = "America/New_York"

# Rate limit outside sync windows
# Downloads still work, just slower (never blocked)
# Use "0" or "unlimited" for no limit
outside_window_rate = "100KB/s"

# Rate limit inside sync windows (usually unlimited)
inside_window_rate = "0"

# Security updates always download at full speed
# Detected by URL patterns: security.debian.org, -security, -updates
urgent_always_full_speed = true

# Define sync windows when full-speed downloads are allowed
# Multiple windows can be defined; downloads run at full speed if ANY window matches

# Example: weeknights 10PM-6AM, unlimited on weekends
# [[scheduler.windows]]
# days = ["weekday"]        # or: ["mon", "tue", "wed", "thu", "fri"]
# start_time = "22:00"       # 24-hour format
# end_time = "06:00"         # Crosses midnight automatically
#
# [[scheduler.windows]]
# days = ["weekend"]         # or: ["sat", "sun"]
# start_time = "00:00"
# end_time = "23:59"

# Day options:
#   Individual: "monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"
#   Short form: "mon", "tue", "wed", "thu", "fri", "sat", "sun"
#   Groups: "weekday" (Mon-Fri), "weekend" (Sat-Sun), "all"/"everyday"/"daily"

#─────────────────────────────────────────────────────────────────────────────
# [fleet] - LAN fleet coordination (v1.9+)
#─────────────────────────────────────────────────────────────────────────────
[fleet]
# Enable fleet coordination for LAN-aware downloads (ON by default).
# When multiple debswarm nodes are on the same LAN, they discover each other via
# mDNS and coordinate to share cached packages and avoid redundant WAN downloads.
# Set to false for an isolated node that should not share on the LAN.
enabled = true

# How long to wait for another node to claim a WAN download
# If no one claims within this time, this node will download
claim_timeout = "5s"

# Maximum time to wait for a peer to finish downloading
# After this, fall back to downloading independently
max_wait_time = "5m"

# Number of concurrent WAN fetchers allowed in the fleet
# Higher values = faster but more WAN traffic
allow_concurrent = 1

# How often to broadcast download progress to peers
refresh_interval = "1s"

#─────────────────────────────────────────────────────────────────────────────
# [index] - Package index settings (v1.18+)
#─────────────────────────────────────────────────────────────────────────────
[index]
# Path to APT's package lists directory
# debswarm parses these files on startup to populate the package index,
# enabling P2P downloads even when apt update doesn't go through the proxy
apt_lists_path = "/var/lib/apt/lists"

# Watch APT lists for changes
# When enabled, debswarm detects when apt update runs and re-parses
# the updated Packages files automatically
watch_apt_lists = true

# Path to APT's package cache (downloaded .deb files)
# debswarm imports existing packages from this directory on startup,
# allowing you to share packages you've already downloaded (v1.19+)
apt_archives_path = "/var/cache/apt/archives"

# Import packages from APT's cache on startup
# When enabled, debswarm scans APT's archives directory and imports
# verified packages into its own cache for P2P sharing
import_apt_archives = true
